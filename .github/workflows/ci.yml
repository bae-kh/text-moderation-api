name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyTorch CPU
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-cache-dir --no-compile \
            "https://download.pytorch.org/whl/cpu/torch-2.2.2%2Bcpu-cp311-cp311-linux_x86_64.whl"

      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir --no-compile -r requirements.txt

      - name: Run tests
        run: |
          pytest -v

  docker-smoke-test:
    name: Build and Smoke Test Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t hate-speech-api .

      - name: Run Docker container
        run: |
          docker run -d --name hate-speech-api-smoke -p 8000:8000 hate-speech-api

      - name: Wait for server startup
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:8000/api/v1/health; then
              echo "Server is ready"
              exit 0
            fi

            echo "Waiting for server..."
            sleep 5
          done

          echo "Server did not start in time"
          docker logs hate-speech-api-smoke
          exit 1

      - name: Stop Docker container
        if: always()
        run: |
          docker stop hate-speech-api-smoke || true