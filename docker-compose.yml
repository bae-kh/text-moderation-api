services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moderation
      POSTGRES_PASSWORD: moderation
      POSTGRES_DB: moderation
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moderation -d moderation"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+psycopg2://moderation:moderation@db:5432/moderation"
      ADMIN_API_KEY: "docker-admin-key-change-me"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - hf-cache:/app/.cache/huggingface
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
  hf-cache:
